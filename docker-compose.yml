services:

  # ── App Server (admin UI on :8090, source of truth for users + locks) ────────
  app-server:
    build:
      context: ./app-server
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - ./logs:/logs
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-dev-token}
      PROXY_TOKEN: ${PROXY_TOKEN:-proxy-dev-token}
      # Optional bootstrap user — created on first start so things work out of the box.
      BOOTSTRAP_USER: ${BOOTSTRAP_USER:-guiuser}
      BOOTSTRAP_PASS: ${BOOTSTRAP_PASS:-guipass}
      BOOTSTRAP_MAX_CONNECTIONS: ${BOOTSTRAP_MAX_CONNECTIONS:-8}
      RUST_LOG: ${RUST_LOG:-info,nzbservice_app_server=debug}
    restart: unless-stopped

  # ── NNTP Proxy (NNTP on :1119; validates auth via app-server) ────────────────
  nntp-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "1119:119"
    volumes:
      - ./logs:/logs
    environment:
      NNTP_HOST: ${NNTP_HOST:-aunews.frugalusenet.com}
      NNTP_PORT: ${NNTP_PORT:-563}
      NNTP_USER: ${NNTP_USER:-sprooty}
      NNTP_PASS: ${NNTP_PASS:-3MemP7tRt}
      NNTP_CONNECTIONS: ${NNTP_CONNECTIONS:-15}
      APP_SERVER_URL: http://app-server:8090
      PROXY_TOKEN: ${PROXY_TOKEN:-proxy-dev-token}
      RUST_LOG: ${RUST_LOG:-info,nntp_proxy=debug}
    depends_on:
      - app-server
    restart: unless-stopped

  # ── GUI (web UI on :8080) ────────────────────────────────────────────────────
  # Pre-build the binary on the host:  (cd gui && cargo build --release)
  gui:
    build:
      context: ./gui
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./downloads:/downloads
      - ./logs:/logs
    environment:
      NNTP_HOST: nntp-proxy
      NNTP_PORT: "119"
      NNTP_USER: ${BOOTSTRAP_USER:-guiuser}
      NNTP_PASS: ${BOOTSTRAP_PASS:-guipass}
      NNTP_CONNECTIONS: "8"
      NNTP_SSL: "false"
      MAX_ACTIVE_DOWNLOADS: "2"
      INDEXARR_URL: ${INDEXARR_URL:-https://nzb.indexarr.net}
      INDEXARR_API_KEY: ${INDEXARR_API_KEY:-}
      APP_SERVER_URL: http://app-server:8090
      PROXY_TOKEN: ${PROXY_TOKEN:-proxy-dev-token}
      # Optional: auto-login on startup so the gui is usable without typing creds.
      # Comment these out to force a manual login on every gui restart.
      BOOTSTRAP_USER: ${BOOTSTRAP_USER:-guiuser}
      BOOTSTRAP_PASS: ${BOOTSTRAP_PASS:-guipass}
      RUST_LOG: ${RUST_LOG:-info,nzb_web=debug,nzb_nntp=info}
    depends_on:
      - nntp-proxy
      - app-server
    restart: unless-stopped

  # ── CLI test client ──────────────────────────────────────────────────────────
  # Pre-build the binary on the host:  (cd client && cargo build --release)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./nzbs:/nzbs:ro
      - ./downloads:/downloads
      - ./logs:/logs
    environment:
      NNTP_HOST: nntp-proxy
      NNTP_PORT: "119"
      NNTP_USER: ${BOOTSTRAP_USER:-guiuser}
      NNTP_PASS: ${BOOTSTRAP_PASS:-guipass}
      NNTP_CONNECTIONS: "8"
      NNTP_SSL: "false"
      BASE_DIR: /downloads
      NZB_DIR: /nzbs
      NZB_FILTER: ${NZB_FILTER:-all}
      RUST_LOG: ${RUST_LOG:-info,nzb_web=debug,nzb_nntp=debug}
    depends_on:
      - nntp-proxy
    restart: "no"
