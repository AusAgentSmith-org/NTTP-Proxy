<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nzbservice</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>nzbservice</h1>
    <nav id="main-nav" class="hidden">
      <button class="tab active" data-tab="queue">Queue</button>
      <button class="tab" data-tab="upload">Upload</button>
      <button class="tab" data-tab="search">Search</button>
    </nav>
    <div id="user-bar" class="hidden user-bar">
      <span id="user-name" class="muted"></span>
      <button id="logout-btn" class="icon-btn" title="Logout">⏻</button>
    </div>
  </header>

  <!-- ─── LOGIN SCREEN ────────────────────────────────────────────────── -->
  <section id="login-screen" class="login-screen hidden">
    <form id="login-form" autocomplete="off">
      <h2>Sign in</h2>
      <input type="text" id="login-user" placeholder="username" autocomplete="username" required>
      <input type="password" id="login-pass" placeholder="password" autocomplete="current-password" required>
      <button type="submit" class="button">Sign in</button>
      <div id="login-error" class="error"></div>
    </form>
  </section>

  <main id="app-main" class="hidden main-app">
    <!-- ─── QUEUE ─────────────────────────────────────────────────────────── -->
    <section id="tab-queue" class="tab-panel active">
      <h2>Active</h2>
      <div id="active-empty" class="empty hidden">No active downloads.</div>
      <table id="active-table" class="jobs">
        <thead>
          <tr><th>Name</th><th>Status</th><th>Progress</th><th>Articles</th><th class="actions-col"></th></tr>
        </thead>
        <tbody></tbody>
      </table>

      <h2>Recent</h2>
      <div id="history-empty" class="empty hidden">Nothing here yet.</div>
      <table id="history-table" class="jobs">
        <thead>
          <tr><th>Name</th><th>Status</th><th>Size</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- ─── UPLOAD ────────────────────────────────────────────────────────── -->
    <section id="tab-upload" class="tab-panel">
      <h2>Upload NZB files</h2>
      <div id="dropzone" class="dropzone">
        <p>Drag &amp; drop <code>.nzb</code> files here</p>
        <p class="muted">or</p>
        <label class="button">
          <input type="file" id="file-input" multiple accept=".nzb,application/x-nzb" hidden>
          Choose files…
        </label>
      </div>
      <div id="upload-result"></div>
    </section>

    <!-- ─── SEARCH ────────────────────────────────────────────────────────── -->
    <section id="tab-search" class="tab-panel">
      <h2>Search nzb.indexarr</h2>
      <form id="search-form" autocomplete="off">
        <input type="text" id="search-q" placeholder="Search term — e.g. movie or show title">
        <button type="submit" class="button">Search</button>
      </form>
      <div id="search-status" class="muted" style="margin: .75rem 0;"></div>
      <table id="search-table" class="jobs hidden">
        <thead>
          <tr>
            <th>Name</th>
            <th>Group</th>
            <th>Posted</th>
            <th>Size</th>
            <th>Files</th>
            <th class="actions-col"></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
